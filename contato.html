<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Entre em contato com a Faculdade UniAlfa para informações sobre cursos, matrículas e serviços.">
    <title>Faculdade UniAlfa - Contato</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <nav class="navbar" aria-label="Menu principal">
            <a href="index.html" class="logo" aria-label="Página inicial">
                <img src="https://www.alfaumuarama.edu.br/fau/images/logop.png" alt="Logo da Faculdade UniAlfa">
            </a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="contato.html" class="nav-link">Contato</a></li>
                <li class="nav-item"><a href="#cursos" class="nav-link">Cursos</a></li>
                <li class="nav-item"><a href="#sobre" class="nav-link">Sobre a gente</a></li>
            </ul>
            <button class="hamburger" aria-label="Abrir menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </nav>
    </header>

    <main>
        <section class="hero-content" aria-label="Formulário de contato">
            <h1 class="hero-title">Contato</h1>
            <p class="hero-subtitle">Entre em contato conosco para mais informações.</p>

            <form class="contact-form" action="#" method="post">
                <div class="form-group">
                    <label for="name">Nome:</label>
                    <input type="text" id="name" name="name" placeholder="Digite seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Mensagem:</label>
                    <textarea id="message" name="message" rows="4" placeholder="Escreva sua mensagem aqui"
                        required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-paper-plane"></i> Enviar
                </button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2025 Faculdade UniAlfa. Todos os direitos reservados.</p>
        <div class="social-icons">
            <a href="https://github.com/danielsz3"><i class="fab fa-github"></i>Daniel Oliveira</a>
            <a href="https://github.com/flpgustavo"><i class="fab fa-github"></i>Felipe Gustavo</a>
            <a href="https://github.com/JoaoGabryel"><i class="fab fa-github"></i>João Gabryel</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
